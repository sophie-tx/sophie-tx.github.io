<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Burmese Festivals — Burmese 12 Months</title>

  <!-- CSS -->
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <!-- Background aura -->
  <div class="bg-aura" aria-hidden="true"></div>

  <div class="container">
    <!-- Header -->
    <header class="top-header">
      <div class="brand">
        <div class="brand-icon" title="Dharma Wheel Symbol" aria-hidden="true">
          <!-- Dharma Wheel (simple SVG) -->
          <svg viewBox="0 0 64 64" class="dharma">
            <circle cx="32" cy="32" r="22" class="dharma-ring"></circle>
            <circle cx="32" cy="32" r="6" class="dharma-core"></circle>
            <g class="dharma-spokes">
              <line x1="32" y1="10" x2="32" y2="22"></line>
              <line x1="32" y1="42" x2="32" y2="54"></line>
              <line x1="10" y1="32" x2="22" y2="32"></line>
              <line x1="42" y1="32" x2="54" y2="32"></line>
              <line x1="17" y1="17" x2="25" y2="25"></line>
              <line x1="39" y1="39" x2="47" y2="47"></line>
              <line x1="47" y1="17" x2="39" y2="25"></line>
              <line x1="25" y1="39" x2="17" y2="47"></line>
            </g>
          </svg>
        </div>

        <div class="brand-text">
          <div class="kicker">Burmese 12 Months and</div>

          <div class="title">Burmese Festivals</div>
        </div>
      </div>
    </header>

    <!-- App root -->
    <main id="app" aria-live="polite">
      <!-- app.js will render everything here -->
      <noscript>Please enable JavaScript to view this project.</noscript>
    </main>

    <footer class="footer">
      Presented by Thomax and Ezio • None of these photos are mine; I borrowed them from Google, Pinterest, and TikTok, so full credit goes to the original owners.
    </footer>
  </div>

  <!-- IMPORTANT: defer prevents JS from running before HTML exists -->
  <script src="./data.js" defer></script>
  <script src="./app.js" defer></script>
</body>
</html>
